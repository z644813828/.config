check program router_cert with path "/etc/monit/scripts/router_cert.sh"
with timeout 60 seconds
    if status = 1
    for 2 times within 5 cycles then alert
    if status = 2 then alert
    if status = 3 for 2880 cycles then alert
    alert my_gmail with mail-format  {     # use local format
        subject: 🔐 Router certificate check failed
    }
    with reminder on 2880 cycles
