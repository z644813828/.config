check file auth.log with path /var/log/auth.log
    ignore match "/etc/monit/whitelist_ips.regex"

    if match "Accepted publickey" then 
        exec "/etc/monit/scripts/ip_location.sh"
    
    if match "Accepted password" then 
        exec "/etc/monit/scripts/ip_location.sh"

    noalert my_gmail

check file auth2.log with path /var/log/auth2.log
    if match "" then alert
    alert my_gmail with mail-format  {     # use local format
        subject: 🛡 New SSH connection
    }
